name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [
          'apps/patient-management-service', 
          'apps/appointment-scheduling-service',
          'apps/provider-management-service',
          'apps/medical-records-service',
          'apps/billing-service'
        ]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 24.x
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: npm audit --audit-level=high || true

    - name: Build
      working-directory: ${{ matrix.service }}
      run: npm run build --if-present

    - name: Test
      working-directory: ${{ matrix.service }}
      run: npm test --if-present
